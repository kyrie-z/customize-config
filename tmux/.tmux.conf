## Claude Watcher bindings
# Ctrl-f a 打开 TUI
bind a run-shell "~/.config/tmux/scripts/open_claude_watcher.sh"
# pane 关闭时清理记录
set-hook -g pane-died 'run -b "python3 ~/.config/tmux/scripts/claude_watcher.py remove-pane #{pane_id}"'

# ------------------------ 基础配置 -------------------------------

setw -g mode-keys vi             # 复制模式使用 Vi 风格的快捷键 (hjkl)
set -g history-limit 50000       # 增加历史输出限制
set -g default-terminal "screen-256color"  # 开启 256 色支持
set-option -ga terminal-overrides ",xterm-256color:Tc"


# ------------------------ prefix -------------------------------

# 修改指令前缀
unbind C-b # C-b 即 Ctrl+b 键，unbind 意味着解除绑定
set -g prefix C-f #
bind C-f send-prefix # 绑定 Ctrl+f 为新的指令前缀



# 添加载在配置文件指令为：,
bind , source-file ~/.tmux.conf \; display "Reloaded!"



# ----------------- session/window/pane -----------------------

unbind %
bind j splitw -h -c '#{pane_current_path}'  # 垂直分割pane
unbind '"'
bind h splitw -v -c '#{pane_current_path}'  # 水平分割pane

bind r command-prompt -I "#W" { rename-window "%%" }  # rename window

#bind f display-popup -E -T "(aa)" -d "#{pane_current_path}" -w 40% -h 50%

bind -T copy-mode-vi WheelUpPane      select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane    select-pane \; send-keys -X -N 1 scroll-down

#bind t command-prompt -I "#{pane_current_command}" { select-pane -T '%%' }  # not work




# ------------------------ mouse -------------------------------

set -g mouse on                  # 启用鼠标支持（滚动/选择/调整窗格）
unbind -Tcopy-mode-vi MouseDragEnd1Pane

bind -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 }
bind -Tcopy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3

bind -T root TripleClick1Pane  select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 }
bind -Tcopy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3

bind -Tcopy-mode-vi MouseDown1Pane select-pane

bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel  # copy-mode-vi 模式下 y键粘贴
bind -T copy-mode-vi v send-keys -X begin-selection   # copy-mode-vi 模式下 v键开始选择



# ------------------------ 显示 -------------------------------

#   ----- 状态栏 -----
set -g status-position top        # 将状态栏移动到顶部
set -g status-justify left # 状态栏列表左对齐
setw -g monitor-activity on # 非当前窗口有内容更新时在状态栏通知
set -g status-style "bg=default" # 状态栏背景透明


#   左侧: Session -> windows
set -g status-left-length 40
set -g status-left "#[fg=#1b1c24,bg=#81a1c1,bold] #S #[fg=#81a1c1,bg=default]  "

setw -g window-status-format "#[fg=#666666,bg=default] #I.#W#{?window_activity_flag, *,} "  #默认 window 显示 "windowID.windowName"，window 有更新显示 "*"
setw -g window-status-activity-style "fg=default,bg=default,none"   #有更新的window颜色与普通窗口保持一致
setw -g window-status-current-format "#[fg=#81a1c1,bg=default,bold] #I.#W "   #当前window高亮

#   右侧：时间
set -g status-right "#[fg=#81a1c1]#[fg=#1b1c24,bg=#81a1c1] %Y-%m-%d %H:%M "


#   ----- window/pane -----
set -g base-index 1 # 设置窗口的起始下标为1
set -g pane-base-index 1 # 设置面板的起始下标为1

set -g pane-border-status top      # 在pane 顶部显示边框条
set -g pane-border-format "#[align=right] #{pane_current_command} " # 显示 pane comm

#  设置非活动pane的背景
set -g window-style "fg=#94a1b2,bg=default"        # 非活动pane：文字变灰，背景深色
set -g window-active-style "fg=#ffffff,bg=#1e1f20" # 活动pane：文字纯白，背景调亮



